name: CI

# Backend + frontend için tip kontrolü, test, build ve bağımlılık CVE taraması.
# Tip/build/test başarısızlığı PR'ı bloklar; lint ve audit bilgilendirme amaçlıdır.

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    name: Backend — typecheck + test
    runs-on: ubuntu-latest
    # Testler PostgreSQL gerektirir (#7 — SQLite kaldırıldı). Servis DB'si: klab_test.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: klab
          POSTGRES_PASSWORD: klab_dev_password
          POSTGRES_DB: klab_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Bağımlılıkları kur
        run: npm ci

      - name: JWT anahtarlarını üret (testler için gerekli)
        run: npm run keys:generate

      - name: Tip kontrolü + build (tsc, noEmitOnError)
        run: npm run build

      - name: Testler (vitest — pg klab_test)
        run: npm test
        env:
          TEST_DATABASE_URL: postgres://klab:klab_dev_password@localhost:5432/klab_test

      - name: Bağımlılık CVE taraması
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

  frontend:
    name: Frontend — typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Bağımlılıkları kur
        run: npm ci

      - name: Tip kontrolü + production build (tsc -b && vite build)
        run: npm run build

      - name: Lint (eslint — hata bloklar, uyarı bloklamaz)
        run: npm run lint

      - name: Bağımlılık CVE taraması
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true
