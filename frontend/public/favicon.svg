<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Yeşil arka plan, yuvarlatılmış kare (mobile/PWA dostu) -->
  <rect width="64" height="64" rx="14" fill="#006B3F"/>

  <!-- Beyaz çember -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#ffffff" stroke-width="1.4"/>

  <!-- Hurma (palmiye) — Kuveyt Türk logosunun stilize edilmiş yorumu -->
  <g fill="#C89B2F" transform="translate(32 33)">
    <!-- Üst orta yaprak (sivri) -->
    <path d="M -1.4 -16 L 0 -19 L 1.4 -16 L 1.4 -7 L -1.4 -7 Z"/>
    <!-- Üst sol yaprak -->
    <path d="M -2.5 -15 L -10 -12 L -3 -7 Z"/>
    <!-- Üst sağ yaprak -->
    <path d="M 2.5 -15 L 10 -12 L 3 -7 Z"/>
    <!-- Geniş sol alt yaprak -->
    <path d="M -3 -8 L -13 -3 L -3 -6 Z"/>
    <!-- Geniş sağ alt yaprak -->
    <path d="M 3 -8 L 13 -3 L 3 -6 Z"/>
    <!-- Yatay yaprak tabanı (orta) -->
    <path d="M -11 -6 L 11 -6 L 8 -3 L -8 -3 Z"/>

    <!-- Gövde: örgü / hurma desenli zigzag -->
    <path d="M -3 -3 L 3 -3 L 2.2 -1 L -2.2 -1 Z"/>
    <path d="M -2.2 -1 L 2.2 -1 L 3 1 L -3 1 Z"/>
    <path d="M -3 1 L 3 1 L 2.2 3 L -2.2 3 Z"/>
    <path d="M -2.2 3 L 2.2 3 L 3 5 L -3 5 Z"/>
    <path d="M -3 5 L 3 5 L 2.2 7 L -2.2 7 Z"/>
    <path d="M -2.2 7 L 2.2 7 L 3 9 L -3 9 Z"/>
    <!-- Gövde tabanı (sivri uç) -->
    <path d="M -3 9 L 3 9 L 0 13 Z"/>
  </g>
</svg>
